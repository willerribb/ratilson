<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>As Aventuras de Ratilson</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>Título provisório (incluir imagem depois)</header>
    <section id="intro" class="comic-intro">
        <div class="comic-grid">
            <div class="comic-grid-item">
                <img src="assets/webp/main_01.webp" alt="" class="quadro-std">
                <img src="assets/webp/main_02.webp" alt="" class="quadro-std">
            </div>
            <div class="comic-grid-item">
                <img src="assets/webp/main_03.webp" alt="" class="quadro-std">
                <img src="assets/webp/main_04.webp" alt="" class="quadro-std">
            </div>
            <div class="comic-grid-item doublewidth">
                <img src="assets/webp/main_05.webp" alt="" class="quadro-std">
            </div>
            <div class="comic-grid-item">
                <img src="assets/webp/main_06.webp" alt="" class="quadro-std">
                <div class="quadro-interativo">
                    <img src="assets/webp/main_07.webp" alt="" class="quadro-std">
                    <div class="interactive-options">
                        <button onclick="navegarPara('trilhaUber')" class="opt-btn" id="btn-opt1">
                            <img src="assets/webp/main_07_option1.webp" alt="">
                        </button>
                        <button onclick="navegarPara('trilhaCarona')" class="opt-btn" id="btn-opt2">
                            <img src="assets/webp/main_07_option2.webp" alt="">
                        </button>
                        <button onclick="navegarPara('trilhaMedo')" class="opt-btn" id="btn-opt3">
                            <img src="assets/webp/main_07_option3.webp" alt="">
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
