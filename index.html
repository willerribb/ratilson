<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>As aventuras de Ratilson</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="comic-container">
        
        <header class="comic-header">
            <img src="assets/webp/comic_title.webp" alt="Título da Comic" class="titulo-img">
        </header>

        <main id="fluxo-historia">
            
            <section id="trilha-intro" class="cena">
                <div class="comic-grid">
                    <img src="assets/webp/main_01.webp" class="quadro">
                    <img src="assets/webp/main_02.webp" class="quadro">
                    <img src="assets/webp/main_03.webp" class="quadro">
                    <img src="assets/webp/main_04.webp" class="quadro">
                    
                    <img src="assets/webp/main_05.webp" class="quadro duplo">
                    
                    <img src="assets/webp/main_06.webp" class="quadro">
                    
                    <div class="quadro-interativo">
                        <img src="assets/webp/main_07.webp" class="quadro">
                        <button class="opt-btn opt-1" onclick="escolherTrilha('trilha-uber')">
                            <img src="assets/webp/main_07_option1.webp">
                        </button>
                        <button class="opt-btn opt-2" onclick="escolherTrilha('trilha-carona')">
                            <img src="assets/webp/main_07_option2.webp">
                        </button>
                        <button class="opt-btn opt-3" onclick="escolherTrilha('trilha-medo')">
                            <img src="assets/webp/main_07_option3.webp">
                        </button>
                    </div>
                </div>
            </section>

        </main>

        <div id="reserva-trilhas">
            
            <section id="trilha-uber" class="cena hidden">
                <div class="comic-grid">
                    <img src="assets/webp/uber_01.webp" class="quadro">
                    <div class="quadro-interativo">
                        <img src="assets/webp/main_07.webp" class="quadro">
                        <button class="opt-btn opt-2" onclick="escolherTrilha('trilha-carona')">
                            <img src="assets/webp/main_07_option2.webp">
                        </button>
                        <button class="opt-btn opt-3" onclick="escolherTrilha('trilha-medo')">
                            <img src="assets/webp/main_07_option3.webp">
                        </button>
                    </div>
                </div>
            </section>

            <section id="trilha-carona" class="cena hidden">
                <div class="comic-grid">
                    <img src="assets/webp/carona_01.webp" class="quadro">
                    <img src="assets/webp/carona_02.webp" class="quadro">
                    <img src="assets/webp/carona_03.webp" class="quadro">
                    <img src="assets/webp/carona_04.webp" class="quadro">
                    <img src="assets/webp/carona_05.webp" class="quadro">
                    <img src="assets/webp/carona_06.webp" class="quadro">
                    <img src="assets/webp/carona_07.webp" class="quadro">
                    <img src="assets/webp/carona_08.webp" class="quadro">
                    <img src="assets/webp/carona_09.webp" class="quadro">
                    <img src="assets/webp/carona_10.webp" class="quadro" id="ultimo-quadro-carona">
                    
                    <div id="fim-carona" class="quadro-interativo duplo dark-souls-container hidden">
                        <img src="assets/webp/carona_11.webp" class="quadro ds-reveal" alt="Você chegou em casa">
                        <button onclick="resetarTudo()" class="ds-reset-btn ds-reveal">TENTAR DE NOVO</button>
                    </div>
                </div>
            </section>

            <section id="trilha-medo" class="cena hidden">
                <div class="comic-grid"> <img src="assets/webp/andar_01.webp" class="quadro">
        
                    <div class="quadro-interativo" id="quadro-braco">
                        <img src="assets/webp/andar_02_background.webp" class="quadro">
                        <img src="assets/webp/andar_02_arm.webp" id="braco-personagem">
                    </div>
        
                    <div id="medo-parte2" class="comic-grid duplo hidden" style="padding: 0; margin: 0; border: none; box-shadow: none;">
                        <img src="assets/webp/andar_03.webp" class="quadro">
            
                    <div id="container-susto" class="quadro-interativo" style="border: none; box-shadow: none; padding: 0; background: transparent;">
                        <img src="assets/webp/andar_04.webp" class="quadro" id="quadro-susto-base">
                        <img src="assets/webp/andar_05.webp" class="quadro jumpscare-imagem" id="quadro-susto-jumpscare">
                    </div>
            
                    <div id="fim-medo" class="quadro-interativo duplo dark-souls-container hidden">
                        <img src="assets/webp/andar_06.webp" class="quadro ds-reveal" alt="Você falhou">
                        <button onclick="resetarTudo()" class="ds-reset-btn ds-reveal">TENTAR NOVAMENTE</button>
                    </div>
                </div>
            </div>
        </section>

        </div>
    </div>

    <audio id="audio-ambiente" src="assets/audio/ambient.mp3" loop preload="auto"></audio>
    <audio id="audio-medo-1" src="assets/audio/audiomedo1.mp3" preload="auto"></audio>
    <audio id="audio-medo-2" src="assets/audio/audiomedo2.mp3" preload="auto"></audio>
    <audio id="audio-jumpscare" src="assets/audio/audiojumpscare.mp3" preload="auto"></audio>

    <script src="script.js"></script>
</body>
</html>
